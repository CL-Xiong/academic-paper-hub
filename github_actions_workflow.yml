name: 自动搜索相对论重力位差测量论文

# 触发条件
on:
  # 每周一早上 10:00 UTC (北京时间 18:00) 自动运行
  schedule:
    - cron: '0 10 * * 1'
  
  # 也可以手动触发（在 GitHub 网页上点击按钮运行）
  workflow_dispatch:

jobs:
  search_papers:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 获取仓库代码
      - name: 📥 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      # 步骤 2: 安装 Python
      - name: 🐍 安装 Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # 步骤 3: 安装依赖
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 步骤 4: 执行搜索
      - name: 🔍 搜索论文
        run: |
          python search_relativistic_gravity.py
      
      # 步骤 5: 检查是否有新结果
      - name: 📊 检查搜索结果
        run: |
          if [ -f "search_results_relativistic_gravity.json" ]; then
            echo "✅ 搜索结果文件已生成"
            ls -lh search_results_relativistic_gravity.json
          else
            echo "⚠️ 未生成搜索结果"
          fi
      
      # 步骤 6: 配置 Git
      - name: ⚙️ 配置 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
      
      # 步骤 7: 提交和推送结果
      - name: 💾 提交搜索结果
        run: |
          # 检查是否有变化
          if [ -n "$(git status --porcelain)" ]; then
            git add search_results_relativistic_gravity.json papers/papers.db
            git commit -m "🤖 自动搜索：相对论重力位差测量论文 $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 结果已推送到仓库"
          else
            echo "ℹ️ 没有新的变化"
          fi
      
      # 步骤 8: 生成搜索报告
      - name: 📈 生成搜索报告
        run: |
          python -c "
          import json
          from datetime import datetime
          
          try:
              with open('search_results_relativistic_gravity.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              
              arxiv_count = len(data.get('arxiv', []))
              cnki_count = len(data.get('cnki', []))
              total = arxiv_count + cnki_count
              
              report = f'''
          # 📚 搜索报告
          
          **执行时间**: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}
          
          ## 搜索结果统计
          
          | 来源 | 论文数 |
          |------|--------|
          | arXiv | {arxiv_count} |
          | CNKI | {cnki_count} |
          | **总计** | **{total}** |
          
          ## 搜索关键词
          
          - 相对论重力位差 (CNKI)
          - relativistic gravity measurement (arXiv)
          - gravitational potential difference (arXiv)
          - relativistic geodesy (arXiv)
          - 重力位差测量 (CNKI)
          
          ## 数据文件
          
          - 📄 搜索结果: `search_results_relativistic_gravity.json`
          - 🗄️ 本地数据库: `papers/papers.db`
          
          ---
          
          **自动执行**: GitHub Actions
          '''
              
              with open('SEARCH_REPORT.md', 'w', encoding='utf-8') as f:
                  f.write(report)
              
              print(report)
          except Exception as e:
              print(f'报告生成失败: {e}')
          "
      
      # 步骤 9: 提交报告
      - name: 📝 提交报告
        run: |
          if [ -f "SEARCH_REPORT.md" ]; then
            git add SEARCH_REPORT.md
            git commit -m "📈 自动生成搜索报告 $(date '+%Y-%m-%d %H:%M:%S')" || true
            git push || true
          fi
      
      # 步骤 10: 工作流结果通知
      - name: ✅ 完成
        if: success()
        run: |
          echo "✅ 搜索工作流执行成功！"
          echo "📊 请访问你的仓库查看最新结果"
      
      # 步骤 11: 失败通知
      - name: ❌ 失败处理
        if: failure()
        run: |
          echo "❌ 搜索工作流执行失败"
          echo "⚠️ 请检查日志获取详细信息"
